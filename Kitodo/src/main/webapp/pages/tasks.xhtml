<ui:composition
        template="/WEB-INF/templates/baseListView.xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:p="http://primefaces.org/ui"
        xmlns:o="http://omnifaces.org/ui">
    <f:metadata>
        <!--@elvariable id="firstRow" type="java.lang.Integer"-->
        <f:viewParam name="firstRow"/>
        <f:viewAction action="#{TaskListView.setFirstRowFromTemplate(firstRow)}" />
        <!--@elvariable id="sortField" type="java.lang.String"-->
        <f:viewParam name="sortField"/>
        <!--@elvariable id="sortOrder" type="java.lang.String"-->
        <f:viewParam name="sortOrder"/>
        <f:viewAction action="#{TaskListView.setSortByFromTemplate(sortField, sortOrder)}" />
        <!--@elvariable id="filter" type="java.lang.String"-->
        <f:viewParam name="filter"/>
        <!--@elvariable id="taskFilter" type="java.lang.String"-->
        <f:viewParam name="taskFilter"/>
        <!--@elvariable id="taskStatus" type="java.lang.String"-->
        <f:viewParam name="taskStatus"/>
        <f:viewAction action="#{TaskListView.setFilterFromTemplate(filter, taskFilter, taskStatus)}" />
        <!--@elvariable id="projecttitle" type="java.lang.String"-->
        <f:viewParam name="projecttitle"/>
        <o:viewAction action="#{TaskListView.changeFilter('project:' += projecttitle)}"
                      if="#{not empty projecttitle}"
                      update="parsedFiltersForm:parsedFilters"/>
    </f:metadata>

    <ui:define name="contentHeader">
        <h3>#{msgs.tasks}</h3>

        <!-- Filters -->
        <h:panelGroup id="filterMenuWrapper">
            <ui:include src="/WEB-INF/templates/includes/tasks/filterMenu.xhtml"/>
        </h:panelGroup>

        <p:button id="search" value="#{msgs.extendedSearch}"
                  icon="fa fa-search" iconPos="right"
                  outcome="extendedSearch"/>

        <h:form id="configureColumnsForm"
                rendered="#{SecurityAccessController.hasAuthorityToConfigureColumns()}">
            <p:selectCheckboxMenu styleClass="configure-columns-button secondary"
                                  label=""
                                  showHeader="false"
                                  converter="#{listColumnConverter}"
                                  title="#{msgs.configureColumns}"
                                  style="float: right; margin-right: 0;"
                                  value="#{TaskListView.selectedColumns}">
                <f:selectItems value="#{TaskListView.columns}" />
                <p:ajax listener="#{TaskListView.saveSelectedColumns()}"
                        update="tasksTabView"/>
            </p:selectCheckboxMenu>
        </h:form>      
        
    </ui:define>

    <ui:define name="pageTabView">
        <p:tabView id="tasksTabView">
            <p:tab id="tasksTab" title="#{msgs.tasks}">
                <ui:include src="/WEB-INF/templates/includes/tasks/taskList.xhtml"/>
            </p:tab>
        </p:tabView>
        <p:ajaxStatus onstart="$('#loadingScreen').show()" oncomplete="$('#loadingScreen').hide()"/>
    </ui:define>

    <ui:define name="breadcrumbs">
        <p:menuitem value="#{msgs.desktop}" url="desktop" icon="fa fa-home"/>
        <p:menuitem value="#{msgs.tasks}" icon="fa fa-paperclip"/>
    </ui:define>

    <ui:define name="page-scripts">
        <h:outputScript name="js/defaultScript.js" target="body"/>
        <h:outputScript name="js/queryParams.js" target="body"/>
    </ui:define>

</ui:composition>
