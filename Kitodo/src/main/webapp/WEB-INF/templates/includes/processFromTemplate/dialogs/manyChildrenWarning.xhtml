<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:p="http://primefaces.org/ui">
    <p:confirmDialog global="true"
                     showEffect="fade"
                     hideEffect="explode"
                     styleClass="confirm-delete"
                     style="padding-left: var(--default-double-size); padding-right: var(--default-double-size);"
                     appendTo="@(body)"
                     widgetVar="manyChildrenWarningDialog"
                     id="manyChildrenWarningDialog">
        <f:facet name="message">
            <h:outputText value="#{CreateProcessForm.catalogImportDialog.getNumberOfChildProcessesWarning()}"/>
            <br/>
            <h:outputText value="#{msgs['doYouWantToProceed']}"/>
        </f:facet>
        <h:form id="importManyChildrenForm">
            <p:commandButton
                    id="confirmButton"
                    value="#{msgs.yes}"
                    styleClass="ui-confirmdialog-yes primary right"
                    icon="fa fa-check fa-lg"
                    iconPos="right"
                    action="#{CreateProcessForm.catalogImportDialog.getRecordHierarchy()}"
                    onclick="PF('manyChildrenWarningDialog').hide();"/>
            <p:commandButton
                    id="cancelButton"
                    value="#{msgs.no}"
                    styleClass="ui-confirmdialog-no secondary right"
                    iconPos="right"
                    icon="fa fa-times fa-lg"
                    onclick="PF('manyChildrenWarningDialog').hide();"/>
        </h:form>
    </p:confirmDialog>
</ui:composition>
